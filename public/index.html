<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0077c7" />
    <meta name="description" content="AimZ - 案件・タスク管理アプリ" />
    <title>AimZ</title>

    <!--
      SPA GitHub Pages リダイレクト復元（rafgraph/spa-github-pages 方式）
      404.html で書き換えられた `/?/path` を本来のパスに戻す。
      React Router がマウントされる前に実行する必要があるため、ここに置く。
    -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <!--
      游ゴシック Medium を font-weight:400 にマッピング（SmartHR デザインシステム推奨）
      Windows での表示品質を確保するための設定
    -->
    <style>
      @font-face {
        font-family: AdjustedYuGothic;
        font-weight: 400;
        src: local("Yu Gothic Medium");
      }
      @font-face {
        font-family: AdjustedYuGothic;
        font-weight: 700;
        src: local("Yu Gothic Bold");
      }
    </style>
  </head>
  <body>
    <noscript>AimZ を使用するには JavaScript を有効にしてください。</noscript>
    <div id="root"></div>
  </body>
</html>
