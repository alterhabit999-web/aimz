<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景：アクセントカラー丸 -->
  <rect width="32" height="32" rx="6" fill="#0077c7"/>
  <!-- AimZ のロゴモチーフ：BarChart2 風の縦棒 3 本（ダッシュボードを連想させる） -->
  <g fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- 横軸 -->
    <line x1="6.5" y1="24" x2="25.5" y2="24"/>
    <!-- 縦棒（短→中→長） -->
    <line x1="11" y1="20" x2="11" y2="15"/>
    <line x1="16" y1="20" x2="16" y2="11"/>
    <line x1="21" y1="20" x2="21" y2="8"/>
  </g>
</svg>
